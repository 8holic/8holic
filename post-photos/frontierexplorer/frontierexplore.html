<!-- ================== GAME BLOCK ================== -->
<div class="ct-game">
  <table class="ct-grid" id="ctGrid"></table>

  <div class="ct-editor">
    <label for="ctCode">Your program:</label>
    <textarea id="ctCode" spellcheck="false">fwd
fwd
while can_go_forward:
    fwd
turn
fwd
turn
while can_go_forward:
    fwd</textarea>

    <div class="ct-buttons">
      <button class="ct-btn" id="ctRunBtn">▶ Run</button>
      <button class="ct-btn" id="ctResetBtn">↺ Reset</button>
    </div>
    <div class="ct-error" id="ctError"></div>
    <div class="ct-status" id="ctStatus">Ready. Write your program and press Run.</div>
  </div>
</div>
